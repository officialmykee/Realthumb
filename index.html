<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories + Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      height: 100%;
      overflow: hidden;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 16px 10px 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .my-avatar-wrap {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .my-avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.5px;
    }

    /* ── STORIES ── */
    .stories-scroll {
      overflow-x: auto;
      overflow-y: visible;
      scrollbar-width: none;
      padding: 8px 0 16px;
      flex-shrink: 0;
    }
    .stories-scroll::-webkit-scrollbar { display: none; }

    .stories-row {
      display: flex;
      flex-direction: row;
      gap: 18px;
      padding: 6px 16px;
      width: max-content;
    }

    /* ── STORY ITEM ── */
    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .story-ring {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0072ff 0%, #00c6ff 60%, #a0e9ff 100%);
      padding: 1.5px;
      position: relative;
      flex-shrink: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .story-ring:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 24px rgba(0,149,246,0.35);
    }

    .story-ring-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff;
      padding: 1.5px;
    }

    .story-ring-inner img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .story-ring.own { background: #c8c8c8; }

    .plus-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 25px;
      height: 25px;
      background: #0095f6;
      border-radius: 50%;
      border: 2.5px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .plus-badge svg {
      width: 12px;
      height: 12px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.8;
      stroke-linecap: round;
      display: block;
    }

    .story-label {
      font-size: 12px;
      font-weight: 500;
      color: #444;
      text-align: center;
      max-width: 82px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .story-item { opacity:0; animation: fadeUp 0.35s ease forwards; }
    .story-item:nth-child(1) { animation-delay:.04s; }
    .story-item:nth-child(2) { animation-delay:.09s; }
    .story-item:nth-child(3) { animation-delay:.14s; }

    /* ── FEED AREA (post.js mounts here) ── */
    #feed-root {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <div class="header">
      <div class="my-avatar-wrap">
        <img src="https://picsum.photos/seed/myhome/80/80" alt="me">
      </div>
      <span class="header-title">Home</span>
    </div>

    <!-- STORIES -->
    <div class="stories-scroll">
      <div class="stories-row">

        <div class="story-item">
          <div class="story-ring own">
            <div class="story-ring-inner">
              <img src="https://picsum.photos/seed/myhome/200/200" alt="Story">
            </div>
            <div class="plus-badge">
              <svg viewBox="0 0 12 12">
                <line x1="6" y1="1.5" x2="6" y2="10.5"/>
                <line x1="1.5" y1="6" x2="10.5" y2="6"/>
              </svg>
            </div>
          </div>
          <span class="story-label">Story</span>
        </div>

        <div class="story-item">
          <div class="story-ring">
            <div class="story-ring-inner">
              <img src="https://picsum.photos/seed/maria42/200/200" alt="Maria">
            </div>
          </div>
          <span class="story-label">Maria</span>
        </div>

        <div class="story-item">
          <div class="story-ring">
            <div class="story-ring-inner">
              <img src="https://picsum.photos/seed/roman77/200/200" alt="Roman" style="filter:grayscale(1)">
            </div>
          </div>
          <span class="story-label">Roman</span>
        </div>

      </div>
    </div>

    <!-- POST CARDS — rendered and controlled by post.js -->
    <div id="feed-root"></div>

  </div>

  <script type="module" src="post.js"></script>
</body>
</html>
